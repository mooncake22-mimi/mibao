// Check hidden unlocks
const checkHiddenUnlocks = (d) => {
  const newUnlocked = {...d.unlockedHidden};
  let changed = false;
  HIDDEN_CROPS.forEach(hc => {
    if(newUnlocked[hc.id]) return;
    const u = hc.unlock;
    if(u.type==="streak") {
      if((d.streaks[u.cat]||0)>=u.days) { newUnlocked[hc.id]=true; changed=true; }
    } else if(u.type==="npc") {
      if((d.npcHearts[u.npc]||0)>=5) { newUnlocked[hc.id]=true; changed=true; }
    } else if(u.type==="egg") {
      if(d.eggFlags && d.eggFlags[u.key]) { newUnlocked[hc.id]=true; changed=true; }
    }
  });
  if(changed) return {...d,unlockedHidden:newUnlocked};
  return d;
};

    const colP = Math.round(Object.keys(d.col).length/ALL_CROPS.length*100);

    const crossSeasonDrops=CROPS.filter(c=>c.r==="normal"&&c.se!==D.gameDate.season);
    const epicDrops=CROPS.filter(c=>c.r==="epic"&&c.se===D.gameDate.season);

      const roll=Math.random();

.sv-btn-blue{background:var(--blue2)!important;border-color:#183060!important;color:#b0d0ff!important;box-shadow:3px 3px 0 var(--shadow)!important;}
.sv-btn-purple{background:var(--purple2)!important;border-color:#281850!important;color:#d0b8ff!important;box-shadow:3px 3px 0 var(--shadow)!important;}
.sv-btn-gold{background:#7a5800!important;border-color:#c09020!important;color:var(--gold)!important;box-shadow:3px 3px 0 var(--shadow)!important;}
.sv-btn-active{background:var(--green)!important;border-color:#2d6022!important;color:#fff!important;}

/* ── Progress bar ── */
.sv-bar-bg{background:#0e0804;border:2px solid var(--border);height:8px;overflow:hidden;}
.sv-bar-fill{height:100%;transition:width .4s;}

/* ── Heart display ── */
.sv-heart{display:inline-block;font-size:12px;line-height:1;}

/* ── Rarity chips ── */
.sv-rarity{display:inline-block;padding:1px 5px;font-size:6px;border:2px solid;border-radius:0;}
.sv-r-normal{background:#1e2a1e;color:#80c080;border-color:#3a6a3a;}
.sv-r-rare{background:#1a2040;color:#80a8f0;border-color:#3060b0;}
.sv-r-epic{background:#2a1840;color:#c080f0;border-color:#7040c0;}
.sv-r-legend{background:#3a2800;color:var(--gold);border-color:var(--gold2);}

/* ── Season banner ── */
.sv-season{padding:2px 8px;font-size:7px;border:2px solid;text-shadow:1px 1px 0 #000;}
.sv-spring{background:#3a1a28;color:#ff90b0;border-color:#c05070;}
.sv-summer{background:#3a2a00;color:var(--gold);border-color:var(--gold2);}
.sv-autumn{background:#3a1800;color:#f08040;border-color:#c05010;}
.sv-winter{background:#0e2040;color:#90c8ff;border-color:#4080c0;}

/* ── Bottom nav ── */
.sv-nav{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;
  background:#1a0c04;
  border-top:4px solid var(--wood);
  outline-top:2px solid var(--border);
  z-index:50;
}
.sv-nav>button{
  flex:1;padding:7px 2px 5px;border:none;
  background:transparent;cursor:pointer;
  font-family:'Press Start 2P',monospace;
  font-size:6px;color:#a07840;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  border-right:1px solid #2a1408;
  transition:background .1s;
}
.sv-nav>button:last-child{border-right:none;}
.sv-nav>button.sv-ac{background:#2a1408;color:var(--gold);}
.sv-nav>button.sv-ac span:first-child{filter:drop-shadow(0 0 3px gold);}

/* ── Modal overlay ── */
.sv-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;padding:14px;}

/* ── Plot tile ── */
.sv-plot{
  aspect-ratio:1;
  border:3px solid var(--wood);
  outline:1px solid var(--border);
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;
  background:repeating-linear-gradient(45deg,#2a1408,#2a1408 3px,#221006 3px,#221006 6px);
  transition:filter .1s;
}
.sv-plot:hover{filter:brightness(1.1);}
.sv-plot-planted{background:#1a2a0e!important;}
.sv-plot-ready{background:#0e2808!important;box-shadow:0 0 6px #40ff40 inset!important;}

/* ── Nutrient pip ── */
.sv-pip{
  display:inline-flex;align-items:center;gap:2px;
  padding:2px 5px;
  background:#0e0804;
  border:2px solid var(--wood);
  font-size:7px;color:var(--cream);
}

/* ── Scrollbar ── */
*::-webkit-scrollbar{width:6px;}
*::-webkit-scrollbar-track{background:#0e0804;}
*::-webkit-scrollbar-thumb{background:var(--wood);border:1px solid var(--border);}

/* ── Animations ── */
@keyframes ani-idle{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes ani-sleep{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
@keyframes ani-blink{0%,90%,100%{transform:scaleY(1)}95%{transform:scaleY(.1)}}
@keyframes ani-wash{0%,100%{transform:rotate(0)}25%{transform:rotate(-15deg)}75%{transform:rotate(15deg)}}
@keyframes ani-sad{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
@keyframes ani-drop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes svglow{0%,100%{box-shadow:3px 3px 0 var(--shadow),0 0 10px rgba(80,200,80,.25)}50%{box-shadow:3px 3px 0 var(--shadow),0 0 22px rgba(80,200,80,.5)}}
@keyframes goldpulse{0%,100%{color:var(--gold)}50%{color:#fff8c0}}
@keyframes starfly{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-30px) scale(.3);opacity:0}}

.ani-idle{animation:ani-idle 3s ease-in-out infinite}
.ani-wash{animation:ani-wash 1s ease-in-out infinite}
.ani-sleep{animation:ani-sleep 4s ease-in-out infinite}
.ani-blink{animation:ani-blink 2s ease-in-out infinite}
.ani-sad{animation:ani-sad .5s ease-in-out infinite}
.ani-drop{animation:ani-drop .6s ease-in-out infinite}
.sv-glow{animation:svglow 2s ease-in-out infinite}
.gold-pulse{animation:goldpulse 1.5s ease-in-out infinite}

/* ── Section heading ── */
.sv-heading{
  font-size:9px;color:var(--gold);
  text-shadow:1px 1px 0 var(--shadow),0 0 8px rgba(240,192,64,.4);
  letter-spacing:1px;
  border-bottom:2px solid var(--wood);
  padding-bottom:4px;margin-bottom:6px;
}

/* ── Divider ── */
.sv-divider{border:none;border-top:2px dashed var(--wood);margin:6px 0;opacity:.5;}

/* ── Tag ── */
.sv-tag{padding:1px 5px;font-size:6px;border:2px solid;background:#0e0804;}

    return <>
      <div style={{textAlign:"center",marginBottom:8}}>
        <div style={{fontSize:32}}>{c.emoji}</div>
        <div style={{fontSize:12,fontWeight:"bold"}}>{c.name}{c.hidden?" 🔮":""}</div>
        <div style={{fontSize:8,color:c.hidden?"#AB47BC":RC[c.r]}}>{RN[c.r]} · {c.desc}</div>
        {c.hidden&&<div style={{fontSize:8,color:"#c080f0",marginTop:2}}>🔮 隐藏作物 · 全季节可种</div>}
      </div>
      <div style={{width:"100%",height:8,background:"#E0E0E0",border:"2px solid #6b3e1e",borderRadius:2,overflow:"hidden",marginBottom:8}}>
        <div style={{height:"100%",width:pr*100+"%",background:dn?"#4CAF50":c.hidden?"#AB47BC":RC[c.r]}}/>
      </div>
      <div style={{fontSize:9,textAlign:"center",marginBottom:8,color:dn?"#4CAF50":"#795548"}}>{dn?"已成熟！":Math.round(pr*100)+"%"}</div>
      <div style={{marginBottom:8}}>{NK.map(k=>{if(!c[k])return null;const fd=p.fed[k]||0;const fl=fd>=c[k];
        return <div key={k} style={{display:"flex",alignItems:"center",gap:4,fontSize:10,marginBottom:3}}>
          <span style={{width:20}}>{NI[k]}</span>
          <div style={{flex:1,height:8,background:"#E0E0E0",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:Math.min(100,fd/c[k]*100)+"%",background:fl?"#4CAF50":"#FF9800"}}/></div>
          <span style={{fontSize:8,width:40,textAlign:"right",color:fl?"#4CAF50":"#795548"}}>{fd}/{c[k]}</span>
        </div>;})}</div>
      <div style={{display:"flex",gap:5}}>
        {!dn&&<button className="sv-btn sv-btn-green" style={{flex:1,fontSize:7,padding:7}} onClick={()=>water(sP)}>💧浇灌</button>}
        {dn&&<button className="sv-btn sv-btn-green" style={{flex:1,fontSize:7,padding:7}} onClick={()=>harvest(sP)}>🌾收获</button>}
        <button className="sv-btn" style={{fontSize:7,padding:7}} onClick={()=>setSP(null)}>关闭</button>
      </div>
    </>;})()}
  </div>
</div>}

    </div>
  );
}
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
